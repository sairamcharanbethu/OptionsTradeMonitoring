name: Build and Deploy

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Skip npm builds if using Docker build cache effectively
      # The Docker builds below will handle compilation
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Convert repository name to lowercase
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}-backend
          tags: |
            type=sha
            type=raw,value=latest
      
      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}-frontend
          tags: |
            type=sha
            type=raw,value=latest
      
      # Build both Docker images in parallel using matrix strategy would require separate jobs
      # Instead, we'll use docker buildx bake for true parallelism
      - name: Create docker-bake.hcl
        run: |
          cat > docker-bake.hcl <<EOF
          group "default" {
            targets = ["backend", "frontend"]
          }
          
          target "backend" {
            context = "./backend"
            dockerfile = "Dockerfile"
            platforms = ["linux/arm64"]
            tags = [for tag in split("\n", "${{ steps.meta-backend.outputs.tags }}") : tag if tag != ""]
            labels = {for label in split("\n", "${{ steps.meta-backend.outputs.labels }}") : split("=", label)[0] => join("=", slice(split("=", label), 1, length(split("=", label)))) if label != ""}
            cache-from = ["type=gha,scope=backend"]
            cache-to = ["type=gha,mode=max,scope=backend"]
            output = ["type=registry"]
          }
          
          target "frontend" {
            context = "./frontend"
            dockerfile = "Dockerfile"
            platforms = ["linux/arm64"]
            tags = [for tag in split("\n", "${{ steps.meta-frontend.outputs.tags }}") : tag if tag != ""]
            labels = {for label in split("\n", "${{ steps.meta-frontend.outputs.labels }}") : split("=", label)[0] => join("=", slice(split("=", label), 1, length(split("=", label)))) if label != ""}
            cache-from = ["type=gha,scope=frontend"]
            cache-to = ["type=gha,mode=max,scope=frontend"]
            output = ["type=registry"]
            args = {
              VITE_APP_BUILD_SHA = "${{ github.sha }}"
            }
          }
          EOF
      
      - name: Build and push both images in parallel
        run: |
          docker buildx bake \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --push

  deploy:
    needs: build
    runs-on: self-hosted
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
    - uses: actions/checkout@v4

    - name: Set deployment environment variables
      id: set-env
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "DEPLOY_PATH=/srv/ssmedia/docker/OptionsTradeMonitoring" >> $GITHUB_ENV
          echo "COMPOSE_PROJECT_NAME=options-monitor-prod" >> $GITHUB_ENV
          echo "ENV_NAME=Production" >> $GITHUB_ENV
          echo "PORT_BACKEND=3001" >> $GITHUB_ENV
          echo "PORT_FRONTEND=8100" >> $GITHUB_ENV
          echo "PORT_DB=5432" >> $GITHUB_ENV
          echo "PORT_REDIS=6379" >> $GITHUB_ENV
        else
          echo "DEPLOY_PATH=/srv/ssmedia/docker/OptionsTradeMonitoring-staging" >> $GITHUB_ENV
          echo "COMPOSE_PROJECT_NAME=options-monitor-staging" >> $GITHUB_ENV
          echo "ENV_NAME=Staging" >> $GITHUB_ENV
          echo "PORT_BACKEND=30020" >> $GITHUB_ENV
          echo "PORT_FRONTEND=8200" >> $GITHUB_ENV
          echo "PORT_DB=5432" >> $GITHUB_ENV
          echo "PORT_REDIS=46380" >> $GITHUB_ENV
        fi

    - name: Prepare SSH key
      shell: bash
      env:
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      run: |
        FIXED_KEY=$(echo "$VPS_SSH_KEY" | sed 's/\\n/\n/g')
        echo "FIXED_SSH_KEY<<EOF" >> $GITHUB_ENV
        echo "$FIXED_KEY" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Copy docker-compose.yml to remote VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ env.FIXED_SSH_KEY }}
        port: 22
        source: "docker-compose.yml"
        target: ${{ env.DEPLOY_PATH }}

    - name: Deploy to remote VPS
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ env.FIXED_SSH_KEY }}
        port: 22
        script: |
          set -e
          echo "=========================================="
          echo "🚀 Starting remote deployment to ${{ env.ENV_NAME }}..."
          echo "=========================================="
          
          cd ${{ env.DEPLOY_PATH }}
          
          if [[ "${{ env.ENV_NAME }}" == "Staging" ]]; then
             echo "📂 Copying .env from Production to Staging..."
             cp -f /srv/ssmedia/docker/OptionsTradeMonitoring/.env .env || echo "⚠️ Could not copy .env from Prod"
          fi
          
          echo "Logging into GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          echo "📥 Pulling latest images in parallel..."
          docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} pull --parallel backend frontend
          
          echo "🔄 Restarting services..."
          export PORT_BACKEND=${{ env.PORT_BACKEND }}
          export PORT_FRONTEND=${{ env.PORT_FRONTEND }}
          export PORT_DB=${{ env.PORT_DB }}
          export PORT_REDIS=${{ env.PORT_REDIS }}
          
          if [[ "${{ env.ENV_NAME }}" == "Production" ]]; then
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} up -d --no-deps backend frontend db redis
          else
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} stop db 2>/dev/null || true
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} rm -f db 2>/dev/null || true
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} up -d --remove-orphans --no-deps backend frontend redis
          fi
          
          echo "🕒 Waiting for containers to stabilize..."
          sleep 3
          
          echo "=========================================="
          echo "📊 Container Status (${{ env.ENV_NAME }}):"
          docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} ps
          
          if docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} ps | grep -q "Restarting\|Exited"; then
            echo "=========================================="
            echo "⚠️  Issues detected. Backend logs:"
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} logs --tail=50 backend
            echo "=========================================="
            echo "⚠️  Frontend logs:"
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} logs --tail=50 frontend
            exit 1
          else
            echo "=========================================="
            echo "✅ All containers in ${{ env.ENV_NAME }} running successfully!"
          fi
          
          echo "=========================================="
          echo "🧹 Cleaning up old images..."
          docker image prune -f --filter "until=24h"
          
          echo "=========================================="
          echo "✅ ${{ env.ENV_NAME }} Deployment completed!"
          echo "=========================================="

    - name: Health Check
      run: |
        echo "✅ Deployment complete. Health check placeholder."
