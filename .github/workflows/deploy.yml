name: Build and Deploy

on:
  push:
    branches: ["main", "staging"]
  pull_request:
    branches: ["main", "staging"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      backend-tag: ${{ steps.tags.outputs.backend }}
      frontend-tag: ${{ steps.tags.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List directory structure
        run: |
          echo "📂 Repository structure:"
          ls -la
          echo ""
          echo "📂 Backend:"
          ls -la backend/ || echo "backend/ not found"
          echo ""
          echo "📂 Frontend:"
          ls -la frontend/ || echo "frontend/ not found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install and build (parallel)
        run: |
          set -e
          echo "🚀 Starting parallel npm builds..."
          
          # Create log files for better debugging
          mkdir -p /tmp/build-logs
          
          # Backend build in background
          (
            set -e
            cd backend
            echo "[Backend] Installing dependencies..."
            npm ci --legacy-peer-deps --prefer-offline --no-audit
            echo "[Backend] Building..."
            npm run build
            echo "[Backend] ✅ Done"
          ) > /tmp/build-logs/backend.log 2>&1 &
          PID_BACKEND=$!
          
          # Frontend build in background
          (
            set -e
            cd frontend
            echo "[Frontend] Installing dependencies..."
            npm ci --legacy-peer-deps --prefer-offline --no-audit
            echo "[Frontend] Building..."
            export VITE_APP_BUILD_SHA=${{ github.sha }}
            npm run build
            echo "[Frontend] ✅ Done"
          ) > /tmp/build-logs/frontend.log 2>&1 &
          PID_FRONTEND=$!
          
          # Wait for both and capture results
          echo "⏳ Waiting for parallel builds..."
          
          BACKEND_OK=0
          FRONTEND_OK=0
          
          wait $PID_BACKEND || BACKEND_OK=1
          wait $PID_FRONTEND || FRONTEND_OK=1
          
          # Show logs
          echo "========== Backend Build Log =========="
          cat /tmp/build-logs/backend.log
          echo "========== Frontend Build Log =========="
          cat /tmp/build-logs/frontend.log
          
          # Check results
          if [ $BACKEND_OK -ne 0 ]; then
            echo "❌ Backend build failed!"
            exit 1
          fi
          if [ $FRONTEND_OK -ne 0 ]; then
            echo "❌ Frontend build failed!"
            exit 1
          fi
          
          echo "✅ Both npm builds completed successfully!"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          SHA_SHORT="${GITHUB_SHA::7}"
          
          echo "repo=${REPO_LOWER}" >> $GITHUB_OUTPUT
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "backend=${{ env.REGISTRY }}/${REPO_LOWER}-backend:sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "frontend=${{ env.REGISTRY }}/${REPO_LOWER}-frontend:sha-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker images (parallel)
        if: github.event_name != 'pull_request'
        run: |
          set -e
          echo "🐳 Starting parallel Docker builds..."
          
          REPO="${{ steps.tags.outputs.repo }}"
          SHA="${{ steps.tags.outputs.sha }}"
          
          mkdir -p /tmp/docker-logs
          
          # Backend Docker build
          (
            set -e
            echo "[Docker Backend] Starting build..."
            docker buildx build \
              --platform linux/arm64 \
              --push \
              --tag "${{ env.REGISTRY }}/${REPO}-backend:sha-${SHA}" \
              --tag "${{ env.REGISTRY }}/${REPO}-backend:latest" \
              --cache-from type=gha,scope=backend \
              --cache-to type=gha,mode=max,scope=backend \
              --progress=plain \
              ./backend
            echo "[Docker Backend] ✅ Done"
          ) > /tmp/docker-logs/backend.log 2>&1 &
          PID_BACKEND=$!
          
          # Frontend Docker build
          (
            set -e
            echo "[Docker Frontend] Starting build..."
            docker buildx build \
              --platform linux/arm64 \
              --push \
              --tag "${{ env.REGISTRY }}/${REPO}-frontend:sha-${SHA}" \
              --tag "${{ env.REGISTRY }}/${REPO}-frontend:latest" \
              --cache-from type=gha,scope=frontend \
              --cache-to type=gha,mode=max,scope=frontend \
              --progress=plain \
              ./frontend
            echo "[Docker Frontend] ✅ Done"
          ) > /tmp/docker-logs/frontend.log 2>&1 &
          PID_FRONTEND=$!
          
          # Progress indicator
          echo "⏳ Building images in parallel..."
          while kill -0 $PID_BACKEND 2>/dev/null || kill -0 $PID_FRONTEND 2>/dev/null; do
            sleep 10
            echo "   ...still building ($(date +%H:%M:%S))"
          done
          
          # Capture exit codes
          BACKEND_OK=0
          FRONTEND_OK=0
          wait $PID_BACKEND || BACKEND_OK=1
          wait $PID_FRONTEND || FRONTEND_OK=1
          
          # Show logs
          echo "========== Docker Backend Log =========="
          cat /tmp/docker-logs/backend.log
          echo "========== Docker Frontend Log =========="
          cat /tmp/docker-logs/frontend.log
          
          # Check results
          if [ $BACKEND_OK -ne 0 ]; then
            echo "❌ Backend Docker build failed!"
            exit 1
          fi
          if [ $FRONTEND_OK -ne 0 ]; then
            echo "❌ Frontend Docker build failed!"
            exit 1
          fi
          
          echo "✅ Both Docker images built and pushed!"

      - name: Build Docker images (PR verification)
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Building images for PR verification (no push)..."
          
          docker buildx build --platform linux/arm64 ./backend &
          docker buildx build --platform linux/arm64 ./frontend &
          
          wait
          echo "✅ PR Docker builds verified!"

  deploy:
    needs: build
    runs-on: self-hosted
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout docker-compose only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Set deployment environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            cat >> $GITHUB_ENV << 'EOF'
          DEPLOY_PATH=/srv/ssmedia/docker/OptionsTradeMonitoring
          COMPOSE_PROJECT_NAME=options-monitor-prod
          ENV_NAME=Production
          PORT_BACKEND=3001
          PORT_FRONTEND=8100
          PORT_DB=5432
          PORT_REDIS=6379
          IS_PRODUCTION=true
          EOF
          else
            cat >> $GITHUB_ENV << 'EOF'
          DEPLOY_PATH=/srv/ssmedia/docker/OptionsTradeMonitoring-staging
          COMPOSE_PROJECT_NAME=options-monitor-staging
          ENV_NAME=Staging
          PORT_BACKEND=30020
          PORT_FRONTEND=8200
          PORT_DB=5432
          PORT_REDIS=46380
          IS_PRODUCTION=false
          EOF
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | sed 's/\\n/\n/g' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to ${{ env.ENV_NAME }}
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          SCP_CMD="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          
          echo "=========================================="
          echo "🚀 Deploying to ${{ env.ENV_NAME }}..."
          echo "=========================================="
          
          # Copy docker-compose.yml
          $SCP_CMD docker-compose.yml ${SSH_USER}@${SSH_HOST}:${{ env.DEPLOY_PATH }}/
          
          # Execute deployment
          $SSH_CMD << REMOTE_SCRIPT
          set -e
          cd ${{ env.DEPLOY_PATH }}
          
          echo "📂 Setting up environment..."
          
          # For Staging: sync .env from Production
          if [[ "${{ env.IS_PRODUCTION }}" != "true" ]]; then
            cp -f /srv/ssmedia/docker/OptionsTradeMonitoring/.env .env 2>/dev/null || echo "⚠️ Could not copy .env"
          fi
          
          # Login to registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull images in parallel
          echo "📥 Pulling latest images..."
          docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} pull backend frontend
          
          # Set port variables
          export PORT_BACKEND=${{ env.PORT_BACKEND }}
          export PORT_FRONTEND=${{ env.PORT_FRONTEND }}
          export PORT_DB=${{ env.PORT_DB }}
          export PORT_REDIS=${{ env.PORT_REDIS }}
          
          # Deploy based on environment
          echo "🔄 Restarting services..."
          if [[ "${{ env.IS_PRODUCTION }}" == "true" ]]; then
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} up -d --no-deps --remove-orphans backend frontend db redis
          else
            # Staging: remove db service, use production database
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} stop db 2>/dev/null || true
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} rm -f db 2>/dev/null || true
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} up -d --no-deps --remove-orphans backend frontend redis
          fi
          
          # Quick health check
          echo "🕒 Waiting for services to start..."
          sleep 5
          
          # Verify deployment
          echo "📊 Container Status:"
          docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} ps
          
          # Check for issues
          if docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} ps | grep -qE "Restarting|Exited"; then
            echo "❌ Deployment issues detected!"
            echo "--- Backend Logs ---"
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} logs --tail=30 backend
            echo "--- Frontend Logs ---"
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} logs --tail=30 frontend
            exit 1
          fi
          
          # Cleanup
          echo "🧹 Cleaning up old images..."
          docker image prune -f --filter "until=24h"
          
          echo "=========================================="
          echo "✅ ${{ env.ENV_NAME }} deployment complete!"
          echo "=========================================="
          REMOTE_SCRIPT

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ env.ENV_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
